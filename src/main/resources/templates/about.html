<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">About</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container main-content mt-4">
    <div class="card p-4">
        <h1 th:text="${appName}">App Name</h1>
        <p class="text-muted">Versi <span th:text="${version}">1.0</span></p>
        <p>Dibuat oleh: <strong th:text="${author}">Author</strong></p>
        <hr>
        <h5>Teknologi yang digunakan:</h5>
        <ul>
            <li th:each="tech : ${technologies}" th:text="${tech}">Tech</li>
        </ul>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
