<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head-content}"></head>
<body class="bg-slate-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl font-bold mx-auto mb-4">
                S
            </div>
            <h1 class="text-2xl font-bold text-slate-900" th:text="${appName}">App Name</h1>
            <p class="text-slate-500">Versi <span th:text="${version}">1.0</span></p>
        </div>

        <div class="border-t border-slate-100 py-6">
            <p class="text-slate-700 text-center mb-6">Dibuat oleh <strong class="text-slate-900" th:text="${author}">Author</strong></p>

            <h5 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4 text-center">Teknologi</h5>
            <div class="flex flex-wrap justify-center gap-2">
                    <span th:each="tech : ${technologies}"
                          class="px-3 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600"
                          th:text="${tech}">Tech</span>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
