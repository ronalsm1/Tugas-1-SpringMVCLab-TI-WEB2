<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head-content}"></head>
<body class="bg-slate-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-8 md:p-12 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-4" th:text="${title}">Title</h1>
            <p class="text-lg text-slate-600 mb-8 max-w-2xl leading-relaxed" th:text="${description}">Description</p>

            <hr class="border-slate-100 my-8">

            <h5 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Jelajahi Produk</h5>

            <div class="flex flex-wrap gap-3">
                <a th:href="@{/products}"
                   class="inline-flex items-center px-5 py-2.5 rounded-lg bg-emerald-600 text-white font-medium hover:bg-emerald-700 transition shadow-sm hover:shadow-md">
                    Semua Produk
                </a>
                <a th:href="@{/products/category/Elektronik}"
                   class="inline-flex items-center px-4 py-2 rounded-lg bg-white border border-slate-200 text-slate-700 font-medium hover:border-emerald-500 hover:text-emerald-600 transition">
                    Elektronik
                </a>
                <a th:href="@{/products/category/Buku}"
                   class="inline-flex items-center px-4 py-2 rounded-lg bg-white border border-slate-200 text-slate-700 font-medium hover:border-emerald-500 hover:text-emerald-600 transition">
                    Buku
                </a>
                <a th:href="@{/products/category/Makanan}"
                   class="inline-flex items-center px-4 py-2 rounded-lg bg-white border border-slate-200 text-slate-700 font-medium hover:border-emerald-500 hover:text-emerald-600 transition">
                    Makanan
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
