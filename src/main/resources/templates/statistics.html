<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head-content}"></head>
<body class="bg-slate-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Statistik Toko</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-slate-500">Total Produk</p>
                <p class="text-3xl font-bold text-slate-800 mt-1" th:text="${totalProducts}">0</p>
            </div>
            <div class="p-3 bg-blue-50 rounded-lg">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-slate-500">Rata-rata Harga</p>
                <p class="text-3xl font-bold text-emerald-600 mt-1" th:text="'Rp ' + ${#numbers.formatDecimal(averagePrice, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
            </div>
            <div class="p-3 bg-emerald-50 rounded-lg">
                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-slate-500">Stok Menipis</p>
                <p class="text-3xl font-bold text-amber-500 mt-1" th:text="${lowStockCount}">0</p>
            </div>
            <div class="p-3 bg-amber-50 rounded-lg">
                <svg class="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
                <h3 class="font-semibold text-slate-800">Distribusi Kategori</h3>
            </div>
            <div class="p-0">
                <ul class="divide-y divide-slate-100">
                    <li class="flex justify-between items-center px-6 py-4 hover:bg-slate-50 transition"
                        th:each="entry : ${categoryStats}">
                        <span class="text-slate-700 font-medium" th:text="${entry.key}">Kategori</span>
                        <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold" th:text="${entry.value}">0</span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
                <h3 class="font-semibold text-slate-800">Analisis Harga</h3>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-2">Termurah</p>
                    <div class="flex items-center justify-between p-4 bg-emerald-50 rounded-lg border border-emerald-100">
                        <span class="font-medium text-emerald-900" th:text="${cheapest.name}">Name</span>
                        <span class="font-bold text-emerald-700" th:text="'Rp ' + ${#numbers.formatDecimal(cheapest.price, 0, 'COMMA', 0, 'POINT')}">0</span>
                    </div>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-2">Termahal</p>
                    <div class="flex items-center justify-between p-4 bg-blue-50 rounded-lg border border-blue-100">
                        <span class="font-medium text-blue-900" th:text="${mostExpensive.name}">Name</span>
                        <span class="font-bold text-blue-700" th:text="'Rp ' + ${#numbers.formatDecimal(mostExpensive.price, 0, 'COMMA', 0, 'POINT')}">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
