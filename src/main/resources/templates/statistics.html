<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">Statistik</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container main-content mt-4">
    <h1 class="mb-4">Statistik Toko</h1>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body text-center">
                    <h3>Total Produk</h3>
                    <h1 th:text="${totalProducts}">0</h1>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body text-center">
                    <h3>Rata-rata Harga</h3>
                    <h4 th:text="'Rp ' + ${#numbers.formatDecimal(averagePrice, 0, 'COMMA', 0, 'POINT')}">Rp 0</h4>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-dark">
                <div class="card-body text-center">
                    <h3>Jumlah Produk dengan Stok Menipis</h3>
                    <h1 th:text="${lowStockCount}">0</h1>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header bg-dark text-white">Distribusi Kategori</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center"
                        th:each="entry : ${categoryStats}">
                        <span th:text="${entry.key}">Kategori</span>
                        <span class="badge bg-primary rounded-pill" th:text="${entry.value}">0</span>
                    </li>
                </ul>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header bg-info text-white">Extreme Price</div>
                <div class="card-body">
                    <p><strong>Termurah:</strong>
                        <span th:text="${cheapest.name}">Name</span>
                        (<span th:text="'Rp ' + ${#numbers.formatDecimal(cheapest.price, 0, 'COMMA', 0, 'POINT')}">0</span>)
                    </p>
                    <p><strong>Termahal:</strong>
                        <span th:text="${mostExpensive.name}">Name</span>
                        (<span th:text="'Rp ' + ${#numbers.formatDecimal(mostExpensive.price, 0, 'COMMA', 0, 'POINT')}">0</span>)
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
