<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head-content">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Spring MVC Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 flex items-center">
                <a th:href="@{/}" class="text-xl font-bold text-slate-800 tracking-tight flex items-center gap-2">
                    Spring MVC Lab
                </a>
            </div>
            <div class="hidden md:flex space-x-8">
                <a th:href="@{/}" class="text-slate-600 hover:text-emerald-600 px-3 py-2 text-sm font-medium transition-colors duration-200">Home</a>
                <a th:href="@{/products}" class="text-slate-600 hover:text-emerald-600 px-3 py-2 text-sm font-medium transition-colors duration-200">Produk</a>
                <a th:href="@{/products/categories}" class="text-slate-600 hover:text-emerald-600 px-3 py-2 text-sm font-medium transition-colors duration-200">Kategori</a>
                <a th:href="@{/statistics}" class="text-slate-600 hover:text-emerald-600 px-3 py-2 text-sm font-medium transition-colors duration-200">Statistik</a>
                <a th:href="@{/about}" class="text-slate-600 hover:text-emerald-600 px-3 py-2 text-sm font-medium transition-colors duration-200">About</a>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-slate-50 border-t border-slate-200 mt-12 py-4">
    <div class="container mx-auto px-4 text-center">
        <p class="text-slate-500 text-sm">
            Spring MVC Lab <span class="mx-2">•</span> WEB 2
        </p>
    </div>
</footer>

</body>
</html>
