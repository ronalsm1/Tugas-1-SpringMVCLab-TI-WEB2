<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head-content}"></head>
<body class="bg-slate-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-slate-900 mb-2" th:text="${title}">Ringkasan Kategori</h1>
        <p class="text-slate-500 mb-8">Jelajahi produk kami berdasarkan kategori.</p>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div th:each="entry : ${categoryStats}" class="group">
                <a th:href="@{/products/category/{nama}(nama=${entry.key})}"
                   class="block bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:border-emerald-500 hover:shadow-md transition duration-200 relative overflow-hidden">

                    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 rounded-full bg-slate-50 group-hover:bg-emerald-50 transition-colors duration-200"></div>

                    <div class="relative z-10 flex justify-between items-center">
                        <div>
                            <h3 class="text-lg font-bold text-slate-800 group-hover:text-emerald-700 transition-colors" th:text="${entry.key}">Nama Kategori</h3>
                            <p class="text-sm text-slate-500 mt-1">Lihat koleksi &rarr;</p>
                        </div>
                        <span class="text-2xl font-bold text-slate-300 group-hover:text-emerald-600 transition-colors"
                              th:text="${entry.value}">0</span>
                    </div>
                </a>
            </div>
        </div>

        <div class="mt-8">
            <a th:href="@{/products}" class="text-sm font-medium text-slate-500 hover:text-emerald-600 transition">
                &larr; Kembali ke Daftar Produk
            </a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
