<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head-content}"></head>
<body class="bg-slate-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 mt-8">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-800" th:text="${title}">Daftar Produk</h1>
            <p class="text-slate-500 text-sm mt-1">
                Menampilkan <strong class="text-slate-900" th:text="${totalProducts}">0</strong> produk tersedia
            </p>
        </div>

        <form th:action="@{/products/search}" method="get" class="w-full md:w-auto">
            <div class="relative group">
                <input type="text" name="keyword"
                       class="w-full md:w-64 pl-4 pr-10 py-2 rounded-lg border border-slate-300 bg-white text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition shadow-sm"
                       placeholder="Cari produk..." th:value="${keyword}">
                <button type="submit" class="absolute right-0 top-0 mt-2 mr-3 text-slate-400 hover:text-emerald-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <div class="flex flex-wrap items-center gap-2 mb-8">
        <span class="text-sm font-medium text-slate-500 mr-2">Filter:</span>
        <a th:href="@{/products}" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 transition">Semua</a>
        <a th:href="@{/products/category/Elektronik}" class="px-3 py-1 rounded-full text-xs font-medium bg-blue-50 text-blue-700 border border-blue-100 hover:bg-blue-100 transition">Elektronik</a>
        <a th:href="@{/products/category/Buku}" class="px-3 py-1 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-100 hover:bg-amber-100 transition">Buku</a>
        <a th:href="@{/products/category/Makanan}" class="px-3 py-1 rounded-full text-xs font-medium bg-orange-50 text-orange-700 border border-orange-100 hover:bg-orange-100 transition">Makanan</a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" th:if="${!products.isEmpty()}">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500 font-semibold tracking-wider">
                    <th class="px-6 py-4">No</th>
                    <th class="px-6 py-4">Nama Produk</th>
                    <th class="px-6 py-4">Kategori</th>
                    <th class="px-6 py-4">Harga</th>
                    <th class="px-6 py-4">Stok</th>
                    <th class="px-6 py-4 text-right">Aksi</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:each="product, iterStat : ${products}" class="hover:bg-slate-50 transition duration-150 ease-in-out group">
                    <td class="px-6 py-4 text-slate-500 text-sm" th:text="${iterStat.count}">1</td>
                    <td class="px-6 py-4 font-medium text-slate-800" th:text="${product.name}">Nama</td>
                    <td class="px-6 py-4">
                        <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                           th:text="${product.category}"
                           class="inline-block px-2 py-1 rounded text-xs font-medium bg-slate-100 text-slate-600 hover:bg-emerald-50 hover:text-emerald-700 transition">
                            Kategori
                        </a>
                    </td>
                    <td class="px-6 py-4 text-slate-700 tabular-nums font-medium"
                        th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span th:text="${product.stock}" class="text-sm text-slate-700 font-medium">0</span>
                            <span th:if="${product.stock < 20}" class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                            <span th:if="${product.stock >= 20}" class="h-2 w-2 rounded-full bg-emerald-500"></span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="text-sm font-medium text-emerald-600 hover:text-emerald-800 hover:underline">Detail</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${products.isEmpty()}" class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-amber-800 text-sm flex items-center gap-2">
        <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        Tidak ada produk yang ditemukan.
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
