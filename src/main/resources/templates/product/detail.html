<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head-content}"></head>
<body class="bg-slate-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 mt-8">

    <div th:if="${product != null}" class="max-w-3xl mx-auto">

        <nav class="flex mb-6 text-sm text-slate-500" aria-label="Breadcrumb">
            <ol class="flex items-center space-x-2">
                <li><a th:href="@{/}" class="hover:text-emerald-600 transition">Home</a></li>
                <li><span class="text-slate-300">/</span></li>
                <li><a th:href="@{/products}" class="hover:text-emerald-600 transition">Produk</a></li>
                <li><span class="text-slate-300">/</span></li>
                <li class="text-emerald-600 font-medium" th:text="${product.name}">Nama</li>
            </ol>
        </nav>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-8">
                <div class="flex justify-between items-start mb-6">
                    <h1 class="text-3xl font-bold text-slate-900" th:text="${product.name}">Nama Produk</h1>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium"
                          th:classappend="${product.stock < 20 ? 'bg-red-50 text-red-700 border border-red-100' : 'bg-emerald-50 text-emerald-700 border border-emerald-100'}">
                            <span th:if="${product.stock < 20}">Stok Menipis</span>
                            <span th:if="${product.stock >= 20}">Tersedia</span>
                        </span>
                </div>

                <div class="border-t border-slate-100">
                    <dl class="divide-y divide-slate-100">
                        <div class="py-4 grid grid-cols-3 gap-4">
                            <dt class="text-sm font-medium text-slate-500">ID Produk</dt>
                            <dd class="text-sm text-slate-900 col-span-2 font-mono" th:text="${product.id}">1</dd>
                        </div>
                        <div class="py-4 grid grid-cols-3 gap-4">
                            <dt class="text-sm font-medium text-slate-500">Kategori</dt>
                            <dd class="text-sm text-slate-900 col-span-2">
                                <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                                   th:text="${product.category}"
                                   class="text-emerald-600 hover:text-emerald-800 font-medium hover:underline decoration-emerald-300 underline-offset-2">Kategori</a>
                            </dd>
                        </div>
                        <div class="py-4 grid grid-cols-3 gap-4">
                            <dt class="text-sm font-medium text-slate-500">Harga Satuan</dt>
                            <dd class="text-xl font-semibold text-slate-900 col-span-2"
                                th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</dd>
                        </div>
                        <div class="py-4 grid grid-cols-3 gap-4">
                            <dt class="text-sm font-medium text-slate-500">Stok Tersedia</dt>
                            <dd class="text-sm text-slate-900 col-span-2" th:text="${product.stock}">0</dd>
                        </div>
                    </dl>
                </div>
            </div>
            <div class="bg-slate-50 px-8 py-4 border-t border-slate-200 flex justify-end">
                <a th:href="@{/products}" class="text-sm font-medium text-slate-600 hover:text-slate-900 transition">Kembali ke Daftar</a>
            </div>
        </div>
    </div>

    <div th:if="${product == null}" class="max-w-2xl mx-auto mt-10">
        <div class="bg-white border-l-4 border-red-500 shadow-sm rounded-r-lg p-6">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg leading-6 font-medium text-slate-900">Produk Tidak Ditemukan</h3>
                    <p class="mt-1 text-sm text-slate-500" th:text="${error}">Error message</p>
                </div>
            </div>
            <div class="mt-4 pl-10">
                <a th:href="@{/products}" class="text-sm font-medium text-red-600 hover:text-red-500">Kembali ke Daftar &rarr;</a>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
